# ============================================================================
# UKF Filter — fuses wheel encoder velocity + IMU yaw rate
#
# publish_tf: false  (default for hw_slam — Cartographer owns odom→base_link)
# hw_nav.launch.py overrides to publish_tf: true so AMCL gets odom→base_link
# ============================================================================
ukf_filter_node:
  ros__parameters:
    frequency: 10.0 # Hz
    two_d_mode: true
    publish_tf: false       # overridden to true in hw_nav.launch.py
    world_frame: odom

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link

    twist0: ugv/wheel_odom
    twist0_config: [
      false,  false,  false, # x,         y,          z
      false,  false,  false, # w_x,       w_y,        w_z
      true,   true,   false, # dx/dt,     dy/dt,      dz/dt
      false,  false,  false, # dw_x/dt,   dw_y/dt,    dw_z/dt
      false,  false,  false  # d^2x/dt^2, d^2y/dt^2,  d^2z/dt^2
    ]

    imu0: ap/imu/corrected/data
    imu0_config: [
      false,  false,  false, # x,         y,          z
      false,  false,  false,  # w_x,       w_y,        w_z
      false,  false,  false, # dx/dt,     dy/dt,      dz/dt
      false,  false,  true,  # dw_x/dt,   dw_y/dt,    dw_z/dt
      false,  false,  false  # d^2x/dt^2, d^2y/dt^2,  d^2z/dt^2
    ]

