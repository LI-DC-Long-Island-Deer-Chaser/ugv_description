# ============================================================================
# Nav2 Parameters for UGV — AMCL Localization on Saved Cartographer Map
# ============================================================================
# Hardware (IRL) configuration — use_sim_time: false throughout
#
# Rover footprint : 0.55 m × 0.35 m  (Ackermann, wheelbase ~0.26 m)
# Inscribed radius: 0.175 m
# Circumscribed   : 0.326 m
# Lidar           : RPLidar C1 (DenseBoost), topic /ugv/lidar
# Odometry        : UKF-fused wheel encoder  → /odometry/filtered
# IMU             : ArduPilot Cube Orange+   → /ap/imu/corrected/data
# ============================================================================

# ────────────────────────────────────────────────────────────────────────────
# AMCL — Adaptive Monte-Carlo Localization
# ────────────────────────────────────────────────────────────────────────────
amcl:
  ros__parameters:
    use_sim_time: false

    # --- Motion model (Ackermann ≈ differential with tighter alpha) ---
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.1          # rotation→rotation noise (tight — encoder-fused odom)
    alpha2: 0.1          # translation→rotation
    alpha3: 0.1          # translation→translation
    alpha4: 0.1          # rotation→translation
    alpha5: 0.1          # translation→translation (omni only, keep low)

    # --- Frame IDs ---
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"

    # --- Particle filter ---
    min_particles: 500
    max_particles: 3000
    pf_err: 0.02
    pf_z: 0.99
    resample_interval: 1
    recovery_alpha_fast: 0.1        # enable fast recovery for kidnapped-robot
    recovery_alpha_slow: 0.001

    # --- Sensor model (RPLidar C1) ---
    laser_model_type: "likelihood_field"
    laser_max_range: 12.0           # match Cartographer max_range
    laser_min_range: 0.15           # match Cartographer min_range
    laser_likelihood_max_dist: 2.0
    max_beams: 120                  # C1 DenseBoost gives ~5000 pts/rev — plenty
    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

    # --- Beam skip (performance optimisation) ---
    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

    # --- Update thresholds ---
    update_min_a: 0.15              # update after 0.15 rad rotation
    update_min_d: 0.15              # update after 0.15 m translation
    save_pose_rate: 0.5
    transform_tolerance: 0.5
    tf_broadcast: true

    # --- Topic ---
    scan_topic: ugv/lidar

amcl_map_client:
  ros__parameters:
    use_sim_time: false

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ────────────────────────────────────────────────────────────────────────────
# Map Server — serves the saved Cartographer PGM map
# ────────────────────────────────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""       # overridden by launch argument 'map'
    topic_name: "map"
    frame_id: "map"

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ────────────────────────────────────────────────────────────────────────────
# BT Navigator
# ────────────────────────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: true
    groot_zmq_publisher_port: 1666
    groot_zmq_server_port: 1667
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ────────────────────────────────────────────────────────────────────────────
# Controller Server — MPPI Ackermann
# ────────────────────────────────────────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3
      yaw_goal_tolerance: 0.4

    # MPPI Controller — Ackermann (same tuning as existing nav2_params)
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      ax_max: 3.0
      ax_min: -3.5
      ay_max: 3.0
      az_max: 3.5
      vx_std: 0.3
      vy_std: 0.0
      wz_std: 0.4
      vx_max: 5.0
      vx_min: -1.0
      vy_max: 0.0
      wz_max: 1.2
      iteration_count: 1
      prune_distance: 2.0
      transform_tolerance: 0.3
      temperature: 0.25
      gamma: 0.015
      motion_model: "Ackermann"
      visualize: false
      regenerate_noises: false
      enforce_path_inversion: false
      inversion_xy_tolerance: 0.2
      inversion_yaw_tolerance: 0.4
      retry_attempt_limit: 1
      publish_optimal_trajectory: false
      publish_critics_stats: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      # Ackermann Constraints — wheelbase ~0.26 m, max steer ~45°
      AckermannConstraints:
        min_turning_r: 0.30

      PathHandler:
        max_robot_pose_search_dist: 10.0
        prune_distance: 2.0
        transform_tolerance: 0.3
        enforce_path_inversion: false
        inversion_xy_tolerance: 0.2
        inversion_yaw_tolerance: 0.4

      critics:
        - "ConstraintCritic"
        - "CostCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.5

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.5
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0
        max_path_occupancy_ratio: 0.07
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 6
        threshold_to_consider: 1.5

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.2
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ────────────────────────────────────────────────────────────────────────────
# Local Costmap  —  tuned inflation for 0.55×0.35 m footprint
# ────────────────────────────────────────────────────────────────────────────
# Inscribed radius ≈ 0.175 m → inflation_radius just outside circumscribed
# radius (0.326 m) + small margin ≈ 0.40 m, cost_scaling_factor raised
# so cost drops off faster (tighter corridors passable).
# ────────────────────────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      footprint: "[[0.275, 0.175], [0.275, -0.175], [-0.275, -0.175], [-0.275, 0.175]]"
      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /ugv/lidar
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0      # steeper dropoff → tighter corridors OK
        inflation_radius: 0.40        # circumscribed 0.326 + 0.074 margin

      always_send_full_costmap: true

  local_costmap_client:
    ros__parameters:
      use_sim_time: false
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false

# ────────────────────────────────────────────────────────────────────────────
# Global Costmap  — static map + live obstacles, same inflation tuning
# ────────────────────────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      footprint: "[[0.275, 0.175], [0.275, -0.175], [-0.275, -0.175], [-0.275, 0.175]]"
      resolution: 0.05
      rolling_window: true
      width: 50
      height: 50
      track_unknown_space: true
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /ugv/lidar
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0      # match local costmap
        inflation_radius: 0.40

      always_send_full_costmap: true

  global_costmap_client:
    ros__parameters:
      use_sim_time: false
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false

# ────────────────────────────────────────────────────────────────────────────
# Planner Server — NavFn (A* enabled for Ackermann friendliness)
# ────────────────────────────────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true           # A* better for Ackermann (smoother paths)
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ────────────────────────────────────────────────────────────────────────────
# Behavior Server (replaces recoveries_server in newer Nav2)
# ────────────────────────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# ────────────────────────────────────────────────────────────────────────────
# Robot State Publisher
# ────────────────────────────────────────────────────────────────────────────
robot_state_publisher:
  ros__parameters:
    use_sim_time: false

# ────────────────────────────────────────────────────────────────────────────
# Waypoint Follower
# ────────────────────────────────────────────────────────────────────────────
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200
