ekf_filter_node_odom:
  ros__parameters:
    two_d_mode: true
    publish_tf: true
    sensor_timeout: 0.1

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom 

    odom0: ugv/wheel_odom
    odom0_config: [
      false,  false,  false, # x,         y,          z
      false,  false,  false, # w_x,       w_y,        w_z
      true,   true,   false, # dx/dt,     dy/dt,      dz/dt
      false,  false,  false, # dw_x/dt,   dw_y/dt,    dw_z/dt
      false,  false,  false  # d^2x/dt^2, d^2y/dt^2,  d^2z/dt^2
    ]

    imu0: ap/imu/corrected/data
    imu0_config: [
      false,  false,  false, # x,         y,          z
      false,  false,  false,  # w_x,       w_y,        w_z
      false,  false,  false, # dx/dt,     dy/dt,      dz/dt
      false,  false,  true,  # dw_x/dt,   dw_y/dt,    dw_z/dt
      false,  false,  false  # d^2x/dt^2, d^2y/dt^2,  d^2z/dt^2
    ]

ekf_filter_node_map:
  ros__parameters:
    two_d_mode: true
    publish_tf: true
    sensor_timeout: 0.1

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    odom0: ugv/odometry/gps
    odom0_config: [
      true,  true,  false,
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, false
      ]

    odom1: ugv/wheel_odom
    odom1_config: [
      false,  false,  false, # x,         y,          z
      false,  false,  false, # w_x,       w_y,        w_z
      true,   true,   false, # dx/dt,     dy/dt,      dz/dt
      false,  false,  false, # dw_x/dt,   dw_y/dt,    dw_z/dt
      false,  false,  false  # d^2x/dt^2, d^2y/dt^2,  d^2z/dt^2
      ]

    imu0: ap/imu/corrected/data
    imu0_config: [
      false,  false,  false, # x,         y,          z
      false,  false,  false,  # w_x,       w_y,        w_z
      false,  false,  false, # dx/dt,     dy/dt,      dz/dt
      false,  false,  true,  # dw_x/dt,   dw_y/dt,    dw_z/dt
      false,  false,  false  # d^2x/dt^2, d^2y/dt^2,  d^2z/dt^2
      ]

navsat_transform:
  ros__parameters:
    frequency: 30.0
    delay: 3.0
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_cartesian_transform: true
    publish_filtered_gps: true
    use_odometry_yaw: true
    wait_for_datum: false